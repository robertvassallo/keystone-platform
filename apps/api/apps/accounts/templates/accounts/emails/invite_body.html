<!doctype html>
<html lang="en">
  <body style="font-family: system-ui, -apple-system, Segoe UI, Helvetica, sans-serif; line-height: 1.5; color: #111827; max-width: 560px; margin: 24px auto; padding: 0 16px;">
    <p>Hi,</p>
    <p><strong>{{ inviter_email }}</strong> invited you to join <strong>{{ tenant_name }}</strong> on Keystone.</p>
    <p>Click the link below to set a password and finish creating your account.</p>
    <p><a href="{{ accept_url }}" style="color: #4f46e5;">{{ accept_url }}</a></p>
    <p>The link expires in 7 days. If you weren't expecting this invitation, you can safely ignore this email.</p>
    <p>— Keystone</p>
  </body>
</html>
